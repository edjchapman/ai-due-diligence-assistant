name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # pgvector service so the migration + vector round-trip run in CI.
    # Trust auth (no password) mirrors the dev docker-compose — nothing to leak.
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: ai_dd
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres@localhost:5432/ai_dd
      RUN_DB_TESTS: '1'

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run db:migrate
      - run: npm test
      # Eval harness — prints the golden-set score table and fails below threshold.
      # Keyless (local providers) so it runs on every push without secrets.
      - run: EMBED_PROVIDER=local EXTRACT_PROVIDER=local LLM_PROVIDER=local JUDGE_PROVIDER=local npm run eval

  # Ship to Railway only on a green push to main — never on PRs, and only after
  # `build` passes (typecheck, lint, format, migration, tests, eval). The container's
  # start:prod migrates, ingests, and serves; railway.json's /health probe gates
  # the release. Requires a RAILWAY_TOKEN repo secret (a Railway project token);
  # the service name defaults to `app` and can be overridden with a RAILWAY_SERVICE
  # repo variable.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Never let two deploys race; queue rather than cancel a release mid-flight.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm i -g @railway/cli@4
      # --ci streams build logs and exits on completion instead of hanging.
      - run: railway up --service "${{ vars.RAILWAY_SERVICE || 'app' }}" --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      # Post-deploy smoke test: poll the live /health until it returns 200, so a
      # deploy that builds but doesn't actually serve traffic still fails the job
      # (and turns the deploy badge red). Retries cover the brief window before the
      # new release is routed. Override the URL with a PRODUCTION_URL repo variable.
      - name: Smoke test /health
        run: |
          url="${{ vars.PRODUCTION_URL || 'https://app-production-e60e.up.railway.app' }}/health"
          for attempt in $(seq 1 10); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "$url" || echo 000)
            echo "attempt ${attempt}: ${url} -> ${code}"
            if [ "${code}" = "200" ]; then
              echo "production is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "production did not return 200 after 10 attempts" >&2
          exit 1
