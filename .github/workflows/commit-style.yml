name: commit-style

# Validate the PR title against the repository commit standard (CONTRIBUTING.md).
# The repo squash-merges every PR, so the PR TITLE becomes the permanent commit
# subject — that is the thing worth validating, not the per-branch WIP commits
# (which are squashed away). Gated to pull_request because the title only exists
# there.
#
# Strict from day one: every merged PR in this repo's history already follows
# Conventional Commits, so there is no legacy runway to honour. A non-conforming
# title fails the check (and the `main-protection` ruleset requires it).

on:
  pull_request:
    branches: [main]

concurrency:
  group: commit-style-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | ./scripts/check-commit-msg.sh --stdin --strict
